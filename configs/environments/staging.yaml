# Staging environment overrides.
# Used for pre-release validation runs with full dataset.
ingestion:
  chunk_size: 50000
validation:
  min_temporal_coverage_days: 365
  min_distinct_accounts: 3
preprocessing:
  interim_output_format: parquet
eda:
  outlier_method: iqr
  outlier_iqr_multiplier: 1.5
statistics:
  alpha: 0.05
  correction_method: bonferroni
ml:
  random_seed: 42
  cv_folds: 5

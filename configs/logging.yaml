version: 1
formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
  file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: "logs/pipeline.log"
loggers:
  pipeline:
    level: INFO
    handlers: [console, file]
  ingestion:
    level: INFO
    handlers: [console, file]

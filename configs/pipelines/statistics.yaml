# Statistical analysis pipeline configuration.
# Governs hypothesis testing parameters per SS 8 of CLAUDE.md.

alpha: 0.05
correction_method: "bonferroni"
min_sample_size: 30

# For chi-square: minimum expected frequency before switching to Fisher's exact test
min_expected_frequency: 5

# Output directories
tables_dir: "outputs/tables/statistics"

# Extended analyses (ET-01 through ET-07)
run_extended_analyses: true

# ET-02: Regime duration bucket boundaries (days)
regime_duration_buckets:
  - 1
  - 3
  - 7
  - 14

# ET-03: Trader segmentation
trader_segment_k_min: 2
trader_segment_k_max: 6

# ET-05: Maximum lag for lagged correlation
max_lag_days: 14

# ET-07: Proportion test significance level
proportion_test_alpha: 0.05

version: "3.9"

services:
  pipeline:
    build: .
    image: bitcoin-sentiment-trader:latest
    container_name: bst-pipeline
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./experiments:/app/experiments
    environment:
      - CONFIG_PATH=configs/base.yaml
      - MLFLOW_TRACKING_URI=file:///app/experiments/mlruns
    command: ["python", "pipelines/run_full_pipeline.py", "--config", "configs/base.yaml"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: bst-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./experiments:/app/experiments
    command: >
      mlflow server
      --backend-store-uri file:///app/experiments/mlruns
      --default-artifact-root file:///app/experiments/artifacts
      --host 0.0.0.0
      --port 5000
